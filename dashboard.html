</h1>

<p>

Manage products and recommendations.

</p>

<i class="fa-solid fa-box"></i>

<h2 id="totalProducts">

0

</h2>

</div>



<div class="dash-card">

<i class="fa-solid fa-users"></i>

<h2 id="totalUsers">

0

</h2>

</div>



<div class="dash-card">

<i class="fa-solid fa-cart-shopping"></i>

0

0</h2>
