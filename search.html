<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Search Product</title>

    <link rel="stylesheet"
        href="css/style.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <header>

        <div class="logo">

            <i class="fa-solid fa-cart-shopping"></i>

            SmartRecommend

        </div>

        <nav>

            <a href="dashboard.html">Dashboard</a>

            <a href="products.html">Products</a>

            <a href="recommendation.html">Recommendations</a>

            <a href="cache.html">LRU Cache</a>

            <a href="search.html">Search</a>

            <a href="index.html">Logout</a>

        </nav>

    </header>


    <section class="search-page">

        <h1>Search Product</h1>

        <p>

            Search products instantly using
            <strong>Binary Search Tree (BST)</strong>.

        </p>


        <div class="search-box">

            <input
                type="number"
                placeholder="Enter Product ID">

            <button>

                <i class="fa-solid fa-magnifying-glass"></i>

                Search

            </button>

        </div>



        <div class="search-result">

            <h2>

                Product Details

            </h2>

            <div class="result-card">

                <i class="fa-solid fa-laptop fa-3x"></i>

                <h3>Laptop</h3>

                <p>

                    <strong>Product ID:</strong>

                    101

                </p>

                <p>

                    <strong>Category:</strong>

                    Electronics

                </p>

                <p>

                    <strong>Rating:</strong>

                    ⭐ 4.8

                </p>

                <p>

                    <strong>Availability:</strong>

                    In Stock

                </p>

            </div>

        </div>

    </section>


   <script src="product.js"></script>
<script src="user.js"></script>
<script src="graph.js"></script>
<script src="bst.js"></script>
<script src="minheap.js"></script>
<script src="LRUcache.js"></script>
<script src="app.js"></script>
</body>

</html>
